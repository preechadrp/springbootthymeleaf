<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Demo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h1 th:text="${message}" class="test" id="msg" ></h1>

<ul>
    <li th:each="user : ${users}" th:text="${user}"></li>
    <li th:if="${#lists.isEmpty(users)}">No users</li>
</ul>

<script th:src="@{/js/app.js}" defer></script>
</body>
</html>
